server:
  port: 8081

logging:
  file:
    name: logs/lovespace-user.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
  level:
    root: INFO
    com.meng.lovespace: INFO
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org.springframework.security: INFO
    # MyBatis 相关注入点的日志级别配置
    com.baomidou.mybatisplus: INFO
    # 开启SQL执行日志（包括SQL语句和执行时间）
    com.meng.lovespace.user.mapper: DEBUG
    # 可选：开启更详细的MyBatis核心日志
    # org.apache.ibatis: DEBUG
    # org.apache.ibatis.logging: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

spring:
  application:
    name: lovespace-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lovespace?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: mq20010724
  data:
    redis:
      host: localhost
      port: 6379
      password:

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

lovespace:
  jwt:
    # 你可以改成 base64 key；此处先用占位字符串。
    secret: "change-me"
    issuer: "lovespace"
    expire-seconds: 7200
  oss:
    endpoint: ""
    access-key-id: ""
    access-key-secret: ""
    bucket: ""
    # 可选：自定义访问域名（CDN/自定义域名）。
    public-base-url: ""
    dir-prefix: "avatars"
  local-storage:
    # 当 OSS 配置不完整时自动使用本地存储。
    upload-dir: "./uploads"
    # 为空时返回相对路径 /local-files/**；可改为 http://127.0.0.1:8081/local-files
    public-base-url: ""
    dir-prefix: "avatars"
  avatar:
    # 2MB
    max-size-bytes: 2097152
    allowed-extensions: [ "jpg", "jpeg", "png", "webp" ]

