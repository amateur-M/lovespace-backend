server:
  port: 8081

logging:
  file:
    name: logs/lovespace-user.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
  level:
    root: INFO
    com.meng.lovespace: DEBUG
    # org.springframework.web.servlet.DispatcherServlet: INFO
    # org.springframework.web.filter.CommonsRequestLoggingFilter: INFO
    # org.springframework.security: INFO
    # MyBatis 相关注入点的日志级别配置
    # com.baomidou.mybatisplus: INFO
    # 开启SQL执行日志（包括SQL语句和执行时间）
    com.meng.lovespace.user.mapper: DEBUG
    # 可选：开启更详细的MyBatis核心日志
    # org.apache.ibatis: DEBUG
    # org.apache.ibatis.logging: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

spring:
  application:
    name: lovespace-user
  # 禁用 OpenAI 自动配置（项目使用通义千问 DashScope）
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      # Milvus RAG 使用通义 DashScope TextEmbedding（lovespace.ai.embedding.provider=dashscope），不启用 OpenAI 嵌入自动配置
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
  servlet:
    multipart:
      # 相册上传不在 Controller 校验大小；框架层放宽到极大值（实际仍受 Tomcat/网关/磁盘限制）
      max-file-size: 10GB
      max-request-size: 10GB
    session:
      cookie:
        name: LOVESPACE_SESSION
        http-only: true
        same-site: lax
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lovespace?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: mq20010724
  data:
    redis:
      host: localhost
      port: 6379
      password:
#  支持 "2026-03-24 23:20:00" 格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  # 分布式 Session：默认关闭。开启时须 lovespace.session.distributed.enabled=true 且 store-type=redis
  session:
    store-type: redis
    redis:
      namespace: lovespace:sessions
    timeout: 2d
  # Spring AI：OpenAI 使用 spring-ai-starter-model-openai（由 lovespace-ai 引入）
  # 通义千问使用 DashScope 官方 SDK；默认模型名见 spring.ai.model
  # 以下为 Milvus 向量库配置（lovespace-user 依赖 lovespace-ai，内含 RAG）；需 Milvus 可达且与 DashScope 嵌入维度一致
  ai:
    model: qwen-turbo
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY:}
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
    vectorstore:
      milvus:
        collection-name: love_knowledge_base
        initialize-schema: true
        embedding-dimension: ${lovespace.ai.embedding.dimensions:1536}
        index-type: IVF_FLAT
        metric-type: COSINE
        database-name: default
        client:
          host: ${MILVUS_HOST:localhost}
          port: ${MILVUS_PORT:19530}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

lovespace:
  memorial:
    # 纪念日 next / upcoming 的 Redis TTL（秒）
    cache-ttl-seconds: 3600
    # 「近期」列表：从今天起连续多少天（含今天），默认 7
    upcoming-window-days: 7
    zone-id: Asia/Shanghai
  session:
    distributed:
      # 是否启用 Redis 分布式 Session（多实例共享；登录写入 Session Cookie，可与 JWT 并存）。默认 false。
      # 启用时请设置：spring.session.store-type=redis，并保证 spring.data.redis 可连。
      enabled: true
  ai:
    # qwen：需 spring.ai.dashscope.api-key；
    # openai：需 spring.ai.openai.api-key
    provider: qwen
    # RAG 向量嵌入（默认通义 text-embedding-v2，与 Milvus embedding-dimension 一致）
    embedding:
      provider: dashscope
      model: text-embedding-v2
      dimensions: 1536
    rag:
      chunk-size: 800
      chunk-overlap: 100
      retrieve-top-k: 4
      # 多轮会话：Redis TTL（秒）与最多保留的「问答轮数」（一轮 = 用户 + 助手各一条）
      conversation-ttl-seconds: 604800
      max-history-pairs: 10
    travel:
      poi-vector-search-enabled: false
  milvus:
    # 启动时若恋爱知识库向量集合不存在则创建（与 spring.ai.vectorstore.milvus 一致）；设为 false 则完全自行管理 Milvus 表
    ensure-love-knowledge-schema: true
    # 是否在启动时尝试 ensure 第二集合 travel_poi_embeddings（骨架日志，见 MilvusSchemaService）
    ensure-travel-poi-schema: false
    travel-poi-collection-name: travel_poi_embeddings
  jwt:
    # 你可以改成 base64 key；此处先用占位字符串。
    secret: "change-me"
    issuer: "lovespace"
    expire-seconds: 7200
  minio:
    # MinIO 配置（优先级最高）
    endpoint: ""  # 例如：http://localhost:9000
    access-key: ""
    secret-key: ""
    bucket: ""
    # 可选：自定义访问域名（CDN/自定义域名）
    public-base-url: ""
    dir-prefix: "avatars"
  oss:
    # 阿里云 OSS 配置（优先级次之）
    endpoint: ""
    access-key-id: ""
    access-key-secret: ""
    bucket: ""
    # 可选：自定义访问域名（CDN/自定义域名）。
    public-base-url: ""
    dir-prefix: "avatars"
  local-storage:
    # 当 MinIO 和 OSS 配置都不完整时自动使用本地存储（优先级最低）。
    upload-dir: "./uploads"
    # 为空时返回相对路径 /local-files/**；可改为 http://127.0.0.1:8081/local-files
    public-base-url: ""
    dir-prefix: "avatars"
  avatar:
    # 2MB
    max-size-bytes: 2097152
    allowed-extensions: [ "jpg", "jpeg", "png", "webp" ]
  timeline-upload:
    # 时间轴配图：20MB
    image-max-size-bytes: 20971520
    # 时间轴视频：默认 100MB（受 Tomcat/网关限制）
    video-max-size-bytes: 104857600
    image-extensions: [ "jpg", "jpeg", "png", "webp" ]
    video-extensions: [ "mp4", "webm", "mov" ]
    # 分片上传单片大小（末片可能更小）
    chunk-size-bytes: 5242880
    # 未完成会话在磁盘上的最长保留时间（小时），超时由定时任务删除
    pending-session-hours: 48

